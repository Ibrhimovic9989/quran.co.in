name: quran_mobile
description: "Quran.co.in — native mobile app. Auth via web flow, everything else native against api.quran.co.in."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  flutter_secure_storage: ^9.2.2
  flutter_web_auth_2: ^4.1.0
  just_audio: ^0.9.46
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.3

# App icon: deep-emerald + gold diamond medallion + mushaf (brand mark).
# Source art in assets/icon; regenerate with `dart run flutter_launcher_icons`.
flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/icon.png
  adaptive_icon_background: "#0C1F1A"
  adaptive_icon_foreground: assets/icon/icon-fg.png
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/fonts/

  fonts:
    - family: UthmanicHafs
      fonts:
        - asset: assets/fonts/UthmanicHafs.ttf
