<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#059669"/>
  
  <!-- Stylized Quran/Mushaf Book -->
  <g transform="translate(16, 16)">
    <!-- Book base -->
    <rect x="-10" y="-7" width="20" height="14" rx="1.5" fill="white" opacity="0.95"/>
    <rect x="-10" y="-7" width="20" height="14" rx="1.5" fill="none" stroke="#059669" stroke-width="0.8"/>
    
    <!-- Book pages/lines (representing verses) -->
    <line x1="-8" y1="-4" x2="8" y2="-4" stroke="#059669" stroke-width="0.6" opacity="0.7"/>
    <line x1="-8" y1="-1" x2="8" y2="-1" stroke="#059669" stroke-width="0.6" opacity="0.7"/>
    <line x1="-8" y1="2" x2="8" y2="2" stroke="#059669" stroke-width="0.6" opacity="0.7"/>
    <line x1="-8" y1="5" x2="8" y2="5" stroke="#059669" stroke-width="0.6" opacity="0.7"/>
    
    <!-- Crescent moon (Islamic symbol) -->
    <path d="M 4 -4 A 2.5 2.5 0 0 1 4 0 A 2.5 2.5 0 0 1 4 -4" fill="#059669" opacity="0.9"/>
    <path d="M 4 -4 A 2.5 2.5 0 0 0 4 0 A 2.5 2.5 0 0 0 4 -4" fill="white"/>
  </g>
</svg>
