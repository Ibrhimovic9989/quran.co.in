<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle for icon -->
  <circle cx="30" cy="30" r="28" fill="none" stroke="#10b981" stroke-width="2" opacity="0.3"/>
  
  <!-- Stylized Quran/Mushaf Book -->
  <g transform="translate(30, 30)">
    <!-- Book base -->
    <rect x="-18" y="-12" width="36" height="24" rx="2" fill="#10b981" opacity="0.15"/>
    <rect x="-18" y="-12" width="36" height="24" rx="2" fill="none" stroke="#10b981" stroke-width="1.5"/>
    
    <!-- Book pages/lines (representing verses) -->
    <line x1="-14" y1="-8" x2="14" y2="-8" stroke="#10b981" stroke-width="1" opacity="0.7"/>
    <line x1="-14" y1="-4" x2="14" y2="-4" stroke="#10b981" stroke-width="1" opacity="0.7"/>
    <line x1="-14" y1="0" x2="14" y2="0" stroke="#10b981" stroke-width="1" opacity="0.7"/>
    <line x1="-14" y1="4" x2="14" y2="4" stroke="#10b981" stroke-width="1" opacity="0.7"/>
    <line x1="-14" y1="8" x2="14" y2="8" stroke="#10b981" stroke-width="1" opacity="0.7"/>
    
    <!-- Crescent moon (Islamic symbol) -->
    <path d="M 8 -8 A 4 4 0 0 1 8 0 A 4 4 0 0 1 8 -8" fill="#10b981" opacity="0.9"/>
    <path d="M 8 -8 A 4 4 0 0 0 8 0 A 4 4 0 0 0 8 -8" fill="#1f2937"/>
  </g>
  
  <!-- Text: Quran.co.in -->
  <text x="70" y="38" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" fill="#f9fafb">
    Quran.co.in
  </text>
  
  <!-- Decorative dot after .in -->
  <circle cx="185" cy="38" r="2" fill="#10b981" opacity="0.7"/>
</svg>
